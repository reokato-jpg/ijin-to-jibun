<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Test Babel minimal</title>
<style>
  body { margin: 0; overflow: hidden; background: #000; }
  #log { position: fixed; top: 0; left: 0; color: #0f0; font: 11px monospace; padding: 8px; background: rgba(0,0,0,0.8); z-index: 999; max-height: 90vh; overflow: auto; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.159.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.159.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="log">Loading...</div>
<script type="module">
const log = document.getElementById('log');
const L = (s) => { log.innerHTML += '<br>' + s; console.log(s); };
window.addEventListener('error', e => L('ERROR: ' + e.message + ' at ' + e.filename + ':' + e.lineno));

try {
  L('step1: import THREE');
  const THREE = await import('three');
  L('step2: THREE ok, r' + THREE.REVISION);

  L('step3: create renderer');
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);
  renderer.setClearColor(0xb0c4d8, 1);
  L('step4: renderer ok');

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0xb0c4d8);
  const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 500);
  camera.position.set(30, 30, 80);
  camera.lookAt(0, 20, 0);

  // レンガテクスチャ
  const c = document.createElement('canvas'); c.width = 256; c.height = 128;
  const g = c.getContext('2d');
  g.fillStyle = '#e8d4b0'; g.fillRect(0, 0, 256, 128);
  g.fillStyle = '#c8a888'; for (let y = 0; y < 128; y += 16) for (let x = 0; x < 256; x += 32) g.fillRect(x + (y/16%2)*16, y+1, 30, 14);
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  const mat = new THREE.MeshStandardMaterial({ map: tex, roughness: 0.9 });

  // 簡易ジッグラト
  const tower = new THREE.Group();
  for (let i = 0; i < 10; i++) {
    const r = 20 - i * 1.7;
    const cyl = new THREE.Mesh(new THREE.CylinderGeometry(r, r, 4, 32), mat);
    cyl.position.y = i * 4 + 2;
    tower.add(cyl);
  }
  scene.add(tower);
  L('step5: tower added, ' + tower.children.length + ' stages');

  // ライト
  scene.add(new THREE.AmbientLight(0xffffff, 0.5));
  const sun = new THREE.DirectionalLight(0xffeac0, 2);
  sun.position.set(-30, 50, 20);
  scene.add(sun);
  L('step6: lights ok');

  // 地面
  const ground = new THREE.Mesh(
    new THREE.CircleGeometry(200, 32),
    new THREE.MeshStandardMaterial({ color: 0x6a7a48, roughness: 1 })
  );
  ground.rotation.x = -Math.PI / 2;
  scene.add(ground);

  L('step7: animate start');
  let t = 0;
  function animate() {
    t += 0.016;
    camera.position.x = Math.cos(t * 0.1) * 80;
    camera.position.z = Math.sin(t * 0.1) * 80;
    camera.lookAt(0, 20, 0);
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
  }
  animate();
  setTimeout(() => L('step8: 3s elapsed, rendering OK'), 3000);
} catch (e) {
  L('FATAL: ' + e.message);
  L(e.stack.split('\n').slice(0, 5).join('<br>'));
}
</script>
</body>
</html>
